services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: ai_visibility_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-ai_visibility}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Express Backend
  server:
    build: ./server
    container_name: ai_visibility_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      DB_NAME: ${DB_NAME:-ai_visibility}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src

  # React Frontend
  client:
    build: ./client
    container_name: ai_visibility_client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - server
    volumes:
      - ./client/app/src:/app/src
      - ./client/app/public:/app/public

volumes:
  mysql_data:
